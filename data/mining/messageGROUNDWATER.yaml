Groundwater:
  Magnetic: |
    Likely not a top choice except for specific situations where magnetic volcanic rocks are involved in the hyrdrgeoloic setting

  Gravity: |
    Structures/Faults > Linear gradients/breaks
    Aquifer monitoring > Time lapse “4D” gravity surveys could help monitor changes in the water table but requires absolute gravimeters and stricter field procedures than other gravity surveys.

  CSAMT/AMT: |
    Aquifers > Low to moderate resistivity with porous sediments
    Structures > Resistivity contrast with low resistivity fluid-filled fractures, may show up as static effect
    Aquitards > High resistivity with silicification, low resistivity with clay
    Basin characterization > Good for mapping bedrock

  MT: |
    Aquifers > Low to moderate resistivity with porous sediments
    Structures > Resistivity contrast with low resistivity fluid-filled fractures, may show up as static effect
    Aquitards > High resistivity with silicification, low resistivity with clay
    Basin characterization > Good for mapping bedrock

  IP: |
    Aquitards > Mapping of clay, moderate to high chargeability and low resistivity
    Water table > May help map the water table for shallow applications

  EM: |
    Fluid filled faults > High conductivity observed in early-time
    Reservoirs > Low resistivity, strong late time
    Aquitards/Structure control > Sharp contrasts in profile
    Water table > Likely best method to help pick water table
