<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    #mining {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        position: relative;
        padding: 2rem;
        border: 1px solid rgba(117, 152, 199, 0.16);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(10, 22, 40, 0.96), rgba(8, 18, 33, 0.96));
        box-shadow: 0 22px 48px rgba(0, 0, 0, 0.2);
    }

    #mining .geo-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 1.05rem;
        overflow: hidden;
        border: 1px solid rgba(117, 152, 199, 0.14);
        border-radius: 20px;
    }

    #mining .geo-table-wrapper {
        position: relative;
        overflow-x: auto;
    }

    #mining .geo-cell {
        padding: 1.25rem;
        text-align: center;
        cursor: pointer;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        font-size: 1.5rem;
        border-right: 1px solid rgba(117, 152, 199, 0.12);
        border-bottom: 1px solid rgba(117, 152, 199, 0.12);
    }

    #mining .geo-cell:hover {
        transform: translateY(-2px);
        box-shadow: inset 0 0 0 1px rgba(123, 191, 255, 0.18);
    }

    #mining .geo-header {
        color: #eaf3ff;
        font-weight: bold;
        padding: 1rem;
        font-size: 1.25rem;
        text-align: center;
        background: linear-gradient(180deg, rgba(18, 44, 76, 0.96), rgba(15, 35, 61, 0.96));
        border-right: 1px solid rgba(117, 152, 199, 0.14);
        border-bottom: 1px solid rgba(117, 152, 199, 0.14);
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    #mining td:nth-child(even) {
        background-color: rgba(13, 29, 53, 0.84);
    }

    #mining td:nth-child(odd) {
        background-color: rgba(9, 21, 39, 0.84);
    }

    #mining tbody .geo-header {
        background: rgba(12, 29, 52, 0.94);
        color: #f5f9ff;
        text-transform: none;
        letter-spacing: 0;
        font-size: 1.15rem;
    }

    #mining .water-glass {
        position: relative;
        display: inline-flex;
        align-items: flex-end;
        justify-content: center;
        width: 1.2rem;
        height: 2rem;
    }

    #mining .water-glass-body {
        position: absolute;
        inset: 0.1rem 0.12rem 0.12rem 0.12rem;
        border: 2px solid #5b6b7a;
        border-top-width: 0.18rem;
        border-radius: 0 0 0.28rem 0.28rem;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92) 0%, rgba(236, 244, 249, 0.95) 100%);
        overflow: hidden;
        box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.7);
    }

    #mining .water-glass-fill {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(180deg, #9be7ff 0%, #219ebc 100%);
    }

    #mining .water-glass.level-3 .water-glass-fill {
        height: 100%;
    }

    #mining .water-glass.level-2 .water-glass-fill {
        height: 50%;
    }

    #mining .water-glass.level-1 .water-glass-fill {
        height: 0;
    }

    #mining .custom-modal-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 1.5rem;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.3s ease, visibility 0.3s ease;
        z-index: 20;
        border-radius: 20px;
    }

    #mining .custom-modal-overlay.active {
        visibility: visible;
        opacity: 1;
    }

    #mining .custom-modal {
        background: linear-gradient(180deg, rgba(10, 22, 40, 0.98), rgba(8, 18, 33, 0.98));
        padding: 2rem;
        border-radius: 1rem;
        border: 1px solid rgba(117, 152, 199, 0.16);
        max-width: 900px;
        max-height: calc(100% - 3rem);
        height: auto;
        overflow-y: auto;
        width: 95%;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.25);
        position: relative;
        animation: fadeInUp 0.4s ease forwards;
        font-size: 1.2rem;
    }

    @keyframes fadeInUp {
        0% {
            transform: translateY(30px);
            opacity: 0;
        }

        100% {
            transform: translateY(0);
            opacity: 1;
        }
    }

    #mining .close-btn {
        position: absolute;
        top: 12px;
        right: 14px;
        font-size: 2.4rem;
        line-height: 1;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        cursor: pointer;
        color: #999;
    }

    #mining .close-btn:hover {
        color: #fff;
    }

    #mining .modal-content-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        padding-top: 1rem;
    }

    #mining .modal-row {
        display: flex;
        flex-direction: row;
        gap: 1rem;
        align-items: flex-start;
        flex-wrap: wrap;
    }

    #mining .modal-label {
        flex: 0 0 40%;
        font-weight: bold;
        color: #dceafb;
    }

    #mining .modal-value {
        flex: 1;
        color: rgba(223, 232, 245, 0.82);
    }

    #mining .modal-title-text {
        font-weight: bold;
        font-size: clamp(1.25rem, 3vw, 2rem);
        color: #f7fbff;
        line-height: 1.25;
    }

    @media (max-width: 640px) {
        #mining {
            padding: 1.25rem;
        }

        #mining .custom-modal-overlay {
            padding: 0.75rem;
        }

        #mining .custom-modal {
            width: 100%;
            padding: 1.25rem;
            max-height: calc(100% - 1.5rem);
        }

        #mining .close-btn {
            top: 8px;
            right: 8px;
            width: 40px;
            height: 40px;
            font-size: 2rem;
        }

        #mining .modal-row {
            flex-direction: column;
            gap: 0.35rem;
        }

        #mining .modal-label {
            flex: 1 1 auto;
        }
    }
</style>

<div id="mining">
    <h2 style="margin-bottom: 1rem;">Groundwater</h2>
    <div class="geo-table-wrapper">
        <table class="geo-table">
            <thead>
                <tr>
                    <th class="geo-header">Deposit / Method</th>
                    <th class="geo-header">Magnetic</th>
                    <th class="geo-header">Gravity</th>
                    <th class="geo-header">CSAMT/AMT</th>
                    <th class="geo-header">MT</th>
                    <th class="geo-header">IP</th>
                    <th class="geo-header">EM</th>
                </tr>
            </thead>
            <tbody data-grid-body></tbody>
        </table>

    <div class="custom-modal-overlay" data-modal-overlay>
        <div class="custom-modal">
            <div class="close-btn" data-close-modal>&times;</div>
            <h5 data-modal-title></h5>
            <div data-modal-content></div>
        </div>
    </div>
    </div>
</div>

<script>
    (function () {
        const root = document.currentScript.previousElementSibling;
        const icons = {
            green: '<span class="water-glass level-3" aria-label="Good suitability"><span class="water-glass-body"><span class="water-glass-fill"></span></span></span>',
            yellow: '<span class="water-glass level-2" aria-label="Okay suitability"><span class="water-glass-body"><span class="water-glass-fill"></span></span></span>',
            blue: '<span class="water-glass level-1" aria-label="Not good suitability"><span class="water-glass-body"><span class="water-glass-fill"></span></span></span>'
        };

        const messages = {
            green: 'Full glass: good suitability',
            yellow: 'Half-full glass: okay suitability',
            blue: 'Empty glass: not good suitability'
        };

        const messagesByTypeAndMethod = {{ hugo.Data.mining.messageGROUNDWATER | jsonify | safeJS
    }};


    const headers = ["Magnetic", "Gravity", "CSAMT/AMT", "MT", "IP", "EM"];

    const data = [
        { type: 'Groundwater', values: ['blue', 'yellow', 'green', 'yellow', 'yellow', 'green'] }
    ];

    const modal = root.querySelector('[data-modal-overlay]');
    const modalTitle = root.querySelector('[data-modal-title]');
    const modalContent = root.querySelector('[data-modal-content]');
    const closeModalBtn = root.querySelector('[data-close-modal]');
    const closeModal = () => modal.classList.remove('active');
    closeModalBtn.onclick = closeModal;
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });

    const tbody = root.querySelector('[data-grid-body]');
    tbody.innerHTML = '';

    data.forEach(row => {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td class="geo-header">${row.type}</td>`;
        row.values.forEach((cell, index) => {
            let td = document.createElement('td');
            td.classList.add('geo-cell');
            const method = headers[index];
            const customMsg = messagesByTypeAndMethod[row.type]?.[method];
            const defaultMsg = messages[cell];

            td.onclick = () => {
                modalTitle.innerHTML = `<span class="modal-title-text">${row.type} → ${method}</span>`;
                if (customMsg) {
                    const lines = customMsg.split('\n');
                    const html = lines.map(line => {
                        const parts = line.split('>');
                        return parts.length === 2
                            ? `<div class="modal-row"><div class="modal-label">${parts[0].trim()}</div><div class="modal-value">${parts[1].trim()}</div></div>`
                            : `<div>${line.trim()}</div>`;
                    }).join('');
                    modalContent.innerHTML = `<div class="modal-content-list">${html}</div>`;
                } else {
                    modalContent.innerHTML = `<p style="font-size: 1.2rem;">${defaultMsg}</p>`;
                }
                modal.classList.add('active');
            };

            td.innerHTML = icons[cell];
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
    }) ();
</script>
