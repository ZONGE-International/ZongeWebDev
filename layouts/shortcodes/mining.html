<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    #mining {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 2rem;
        border: 1px solid rgba(117, 152, 199, 0.16);
        border-radius: 24px;
        background: linear-gradient(180deg, rgba(10, 22, 40, 0.96), rgba(8, 18, 33, 0.96));
        box-shadow: 0 22px 48px rgba(0, 0, 0, 0.2);
    }

    #mining .geo-table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 1.05rem;
        overflow: hidden;
        border: 1px solid rgba(117, 152, 199, 0.14);
        border-radius: 20px;
    }

    #mining .geo-cell {
        padding: 1.25rem;
        text-align: center;
        cursor: pointer;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        font-size: 1.5rem;
        border-right: 1px solid rgba(117, 152, 199, 0.12);
        border-bottom: 1px solid rgba(117, 152, 199, 0.12);
    }

    #mining .geo-cell:hover {
        transform: translateY(-2px);
        box-shadow: inset 0 0 0 1px rgba(123, 191, 255, 0.18);
    }

    #mining .geo-header {
        color: #eaf3ff;
        font-weight: bold;
        padding: 1rem;
        font-size: 1.25rem;
        text-align: center;
        background: linear-gradient(180deg, rgba(18, 44, 76, 0.96), rgba(15, 35, 61, 0.96));
        border-right: 1px solid rgba(117, 152, 199, 0.14);
        border-bottom: 1px solid rgba(117, 152, 199, 0.14);
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    #mining td:nth-child(even) {
        background-color: rgba(13, 29, 53, 0.84);
    }

    #mining td:nth-child(odd) {
        background-color: rgba(9, 21, 39, 0.84);
    }

    #mining tbody .geo-header {
        background: rgba(12, 29, 52, 0.94);
        color: #f5f9ff;
        text-transform: none;
        letter-spacing: 0;
        font-size: 1.15rem;
    }

    #mining .rating-bars {
        display: inline-flex;
        align-items: flex-end;
        justify-content: center;
        gap: 0.22rem;
        min-height: 2rem;
    }

    #mining .rating-bar {
        width: 0.38rem;
        border-radius: 999px;
        opacity: 0.28;
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.35), 0 1px 2px rgba(0, 0, 0, 0.18);
    }

    #mining .rating-bars .rating-bar:nth-child(1) {
        height: 0.9rem;
    }

    #mining .rating-bars .rating-bar:nth-child(2) {
        height: 1.25rem;
    }

    #mining .rating-bars .rating-bar:nth-child(3) {
        height: 1.65rem;
    }

    #mining .rating-bars.rating-gold .rating-bar {
        background: linear-gradient(180deg, #f9e18a 0%, #c99a1d 100%);
    }

    #mining .rating-bars.rating-silver .rating-bar {
        background: linear-gradient(180deg, #f4f6f8 0%, #9aa6b2 100%);
    }

    #mining .rating-bars.rating-copper .rating-bar {
        background: linear-gradient(180deg, #e9b08b 0%, #a5542a 100%);
    }

    #mining .rating-bars[data-level="1"] .rating-bar:nth-child(1),
    #mining .rating-bars[data-level="2"] .rating-bar:nth-child(-n+2),
    #mining .rating-bars[data-level="3"] .rating-bar {
        opacity: 1;
    }

    #mining .custom-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.3s ease, visibility 0.3s ease;
        z-index: 9999;
    }

    #mining .custom-modal-overlay.active {
        visibility: visible;
        opacity: 1;
    }

    #mining .custom-modal {
        background: linear-gradient(180deg, rgba(10, 22, 40, 0.98), rgba(8, 18, 33, 0.98));
        padding: 2rem;
        border-radius: 1rem;
        border: 1px solid rgba(117, 152, 199, 0.16);
        max-width: 900px;
        max-height: 95vh;
        height: auto;
        overflow-y: auto;
        width: 95%;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.25);
        position: relative;
        animation: fadeInUp 0.4s ease forwards;
        font-size: 1.2rem;
    }

    @keyframes fadeInUp {
        0% {
            transform: translateY(30px);
            opacity: 0;
        }

        100% {
            transform: translateY(0);
            opacity: 1;
        }
    }

    #mining .close-btn {
        position: absolute;
        top: 12px;
        right: 14px;
        font-size: 2.4rem;
        line-height: 1;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        cursor: pointer;
        color: #999;
    }

    #mining .close-btn:hover {
        color: #fff;
    }

    #mining .modal-content-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        padding-top: 1rem;
    }

    #mining .modal-row {
        display: flex;
        flex-direction: row;
        gap: 1rem;
        align-items: flex-start;
        flex-wrap: wrap;
    }

    #mining .modal-label {
        flex: 0 0 40%;
        font-weight: bold;
        color: #dceafb;
    }

    #mining .modal-value {
        flex: 1;
        color: rgba(223, 232, 245, 0.82);
    }

    #mining .modal-title-text {
        font-weight: bold;
        font-size: clamp(1.25rem, 3vw, 2rem);
        color: #f7fbff;
        line-height: 1.25;
    }
</style>

<div id="mining">
    <h2 style="margin-bottom: 1rem;">Mining</h2>
    <div class="geo-table-wrapper" style="overflow-x: auto;">
        <table class="geo-table">
            <thead>
                <tr>
                    <th class="geo-header">Deposit / Method</th>
                    <th class="geo-header">Magnetic</th>
                    <th class="geo-header">Gravity</th>
                    <th class="geo-header">CSAMT/AMT</th>
                    <th class="geo-header">MT</th>
                    <th class="geo-header">IP</th>
                    <th class="geo-header">EM</th>
                </tr>
            </thead>
            <tbody id="grid-body"></tbody>
        </table>
    </div>

    <div class="custom-modal-overlay" id="modalOverlay">
        <div class="custom-modal">
            <div class="close-btn" id="closeModal">&times;</div>
            <h5 id="modalTitle"></h5>
            <div id="modalContent"></div>
        </div>
    </div>
</div>

<script>
    (function () {
        const icons = {
            green: '<span class="rating-bars rating-gold" data-level="3" aria-label="Gold rating"><span class="rating-bar"></span><span class="rating-bar"></span><span class="rating-bar"></span></span>',
            yellow: '<span class="rating-bars rating-silver" data-level="2" aria-label="Silver rating"><span class="rating-bar"></span><span class="rating-bar"></span><span class="rating-bar"></span></span>',
            blue: '<span class="rating-bars rating-copper" data-level="1" aria-label="Copper rating"><span class="rating-bar"></span><span class="rating-bar"></span><span class="rating-bar"></span></span>'
        };

        const messages = {
            green: 'Gold rating: highly suitable method',
            yellow: 'Silver rating: moderately useful method',
            blue: 'Copper rating: lower usefulness for this deposit'
        };


        const messagesByTypeAndMethod = {{ site.Data.mining.messageMINING | jsonify | safeJS
    }};


    const headers = ["Magnetic", "Gravity", "CSAMT/AMT", "MT", "IP", "EM"];

    const data = [
        { type: 'Epithermal', lookupKey: 'Epithermal Systems', values: ['yellow', 'yellow', 'green', 'yellow', 'green', 'blue'] },
        { type: 'Porphyry Cu-Au', lookupKey: 'Porphyry', values: ['green', 'yellow', 'yellow', 'green', 'green', 'blue'] },
        { type: 'Skarn', values: ['green', 'yellow', 'yellow', 'yellow', 'green', 'green'] },
        { type: 'CRD', values: ['yellow', 'yellow', 'green', 'yellow', 'yellow', 'green'] },
        { type: 'Carlin (Au)', values: ['blue', 'green', 'green', 'yellow', 'yellow', 'blue'] },
        { type: 'VMS', values: ['yellow', 'green', 'yellow', 'blue', 'blue', 'green'] },
        { type: 'IOCG', values: ['green', 'yellow', 'green', 'yellow', 'yellow', 'blue'] },
        { type: 'Lithium', values: ['blue', 'green', 'green', 'green', 'blue', 'green'] }
    ];

    const modal = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalContent = document.getElementById('modalContent');
    const closeModalBtn = document.getElementById('closeModal');
    const closeModal = () => modal.classList.remove('active');
    closeModalBtn.onclick = closeModal;
    modal.addEventListener('click', (e) => {
        if (e.target === modal) closeModal();
    });

    const tbody = document.getElementById('grid-body');
    tbody.innerHTML = '';

    data.forEach(row => {
        let tr = document.createElement('tr');
        tr.innerHTML = `<td class="geo-header">${row.type}</td>`;
        row.values.forEach((cell, index) => {
            let td = document.createElement('td');
            td.classList.add('geo-cell');
            const method = headers[index];
            const lookupKey = row.lookupKey || row.type;
            const customMsg = messagesByTypeAndMethod[lookupKey]?.[method];
            const defaultMsg = messages[cell];

            td.onclick = () => {
                modalTitle.innerHTML = `<span class="modal-title-text">${row.type} → ${method}</span>`;
                if (customMsg) {
                    const lines = customMsg.split('\n');
                    const html = lines.map(line => {
                        const parts = line.split('>');
                        return parts.length === 2
                            ? `<div class="modal-row"><div class="modal-label">${parts[0].trim()}</div><div class="modal-value">${parts[1].trim()}</div></div>`
                            : `<div>${line.trim()}</div>`;
                    }).join('');
                    modalContent.innerHTML = `<div class="modal-content-list">${html}</div>`;
                } else {
                    modalContent.innerHTML = `<p style="font-size: 1.2rem;">${defaultMsg}</p>`;
                }
                modal.classList.add('active');
            };

            td.innerHTML = icons[cell];
            tr.appendChild(td);
        });
        tbody.appendChild(tr);
    });
    }) ();
</script>
